<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>로또 번호 추천기</title>

  <style>
    :root {
      --bg-color: #f6f7fb;
      --text-color: #111;
      --card-bg: #fff;
      --card-shadow: rgba(0,0,0,0.05);
      --btn-bg: #1f6feb;
      --btn-color: white;
      --set-bg: #f3f6ff;
      --ball-bg: #fff;
      --ball-border: #ddd;
    }

    body.dark-mode {
      --bg-color: #0d1117;
      --text-color: #c9d1d9;
      --card-bg: #161b22;
      --card-shadow: rgba(0,0,0,0.3);
      --btn-bg: #238636;
      --btn-color: white;
      --set-bg: #21262d;
      --ball-bg: #30363d;
      --ball-border: #444c56;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Noto Sans KR", sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
      transition: background 0.3s, color 0.3s;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 28px 16px;
    }

    .card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 6px 20px var(--card-shadow);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
    }

    .row {
      margin-bottom: 16px;
    }

    button {
      border: 0;
      background: var(--btn-bg);
      color: var(--btn-color);
      padding: 12px 16px;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.3s;
    }

    #themeToggle {
      background: transparent;
      border: 1px solid var(--btn-bg);
      color: var(--btn-bg);
      padding: 6px 12px;
    }

    body.dark-mode #themeToggle {
      border-color: #c9d1d9;
      color: #c9d1d9;
    }

    .result {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .set {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 10px;
      border-radius: 12px;
      background: var(--set-bg);
    }

    .ball {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--ball-bg);
      border: 1px solid var(--ball-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      color: var(--text-color);
    }

    .set-label {
      width: 60px;
      font-weight: 700;
      display: flex;
      align-items: center;
    }

    .contact-card {
      margin-top: 24px;
    }

    .contact-card h2 {
      margin-top: 0;
      font-size: 18px;
      margin-bottom: 16px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .form-group input, 
    .form-group textarea {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--ball-border);
      background: var(--ball-bg);
      color: var(--text-color);
      box-sizing: border-box;
      font-family: inherit;
    }

    .form-group input:focus, 
    .form-group textarea:focus {
      outline: none;
      border-color: var(--btn-bg);
    }

  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <div class="header">
        <h1>로또 번호 추천기 (6/45)</h1>
        <button id="themeToggle">테마 변경</button>
      </div>

      <div class="row">
        <button id="btnGen">번호 5세트 추천받기</button>
      </div>

      <div id="result" class="result"></div>
    </div>

    <div class="card contact-card">
      <h2>제휴 문의</h2>
      <form action="https://formspree.io/f/xeelvdoz" method="POST">
        <div class="form-group">
          <label for="email">이메일 주소</label>
          <input type="email" name="email" id="email" placeholder="example@mail.com" required>
        </div>
        <div class="form-group">
          <label for="message">문의 내용</label>
          <textarea name="message" id="message" rows="4" placeholder="문의하실 내용을 입력해주세요." required></textarea>
        </div>
        <button type="submit">문의 보내기</button>
      </form>
    </div>
  </div>

<script>

const themeToggle = document.getElementById('themeToggle');
const body = document.body;

// 초기 테마 설정
if (localStorage.getItem('theme') === 'dark') {
  body.classList.add('dark-mode');
}

themeToggle.addEventListener('click', () => {
  body.classList.toggle('dark-mode');
  const isDark = body.classList.contains('dark-mode');
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
});

function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function pickOneSet() {
  const set = new Set();
  while (set.size < 6) {
    set.add(randInt(1, 45));
  }
  return Array.from(set).sort((a,b) => a-b);
}

function generateFiveSets() {
  const resultDiv = document.getElementById("result");
  resultDiv.innerHTML = "";

  for (let i = 1; i <= 5; i++) {
    const numbers = pickOneSet();

    const setDiv = document.createElement("div");
    setDiv.className = "set";

    const label = document.createElement("div");
    label.className = "set-label";
    label.textContent = i + "세트";
    setDiv.appendChild(label);

    numbers.forEach(n => {
      const ball = document.createElement("div");
      ball.className = "ball";
      ball.textContent = n;
      setDiv.appendChild(ball);
    });

    resultDiv.appendChild(setDiv);
  }
}

document.getElementById("btnGen").addEventListener("click", generateFiveSets);

</script>
</body>
</html>
